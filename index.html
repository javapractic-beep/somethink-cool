<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚩 Майектеш</title>
    <link rel="icon"
        href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Flag_of_Kyrgyzstan.svg/1920px-Flag_of_Kyrgyzstan.svg.png" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #E63946 0%, #FFB703 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #E63946 0%, #FFB703 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            font-weight: 800;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .board-container {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .sidebar {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .sidebar h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 1.2em;
            border-bottom: 2px solid #E63946;
            padding-bottom: 10px;
        }

        .board-list {
            list-style: none;
        }

        .board-item {
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            color: #555;
        }

        .board-item:last-child {
            border-bottom: none;
        }

        .board-item:hover {
            color: #E63946;
            padding-left: 10px;
            background: #ffe8e8;
            padding-right: 10px;
            border-radius: 6px;
            margin: 0 -10px;
            padding: 12px 10px;
        }

        .board-item.active {
            color: #E63946;
            font-weight: 700;
            background: linear-gradient(90deg, rgba(230, 57, 70, 0.1) 0%, transparent 100%);
            padding-left: 10px;
            padding-right: 10px;
            margin: 0 -10px;
            padding: 12px 10px;
            border-radius: 6px;
        }

        .main-content {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .board-title {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #E63946;
        }

        .create-post-panel {
            background: linear-gradient(135deg, rgba(230, 57, 70, 0.1) 0%, rgba(255, 183, 3, 0.1) 100%);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            border: 2px dashed #E63946;
        }

        .create-post-panel h4 {
            margin-bottom: 15px;
            color: #333;
        }

        .post-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        textarea:focus {
            outline: none;
            border-color: #E63946;
            box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #E63946 0%, #FFB703 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(230, 57, 70, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .posts-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .post {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #E63946;
            transition: all 0.3s ease;
        }

        .post:hover {
            box-shadow: 0 4px 12px rgba(230, 57, 70, 0.15);
            background: #ffffff;
        }

        .post-header {
            display: flex;
            gap: 15px;
            margin-bottom: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .post-author {
            font-weight: 700;
            color: #E63946;
            font-size: 1.05em;
        }

        .post-email {
            color: #999;
            font-size: 0.9em;
        }

        .post-time {
            color: #999;
            font-size: 0.9em;
            margin-left: auto;
        }

        .post-number {
            background: #E63946;
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .post-content {
            color: #333;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            margin-bottom: 12px;
        }

        .post-media {
            margin-bottom: 12px;
        }

        .post-media img,
        .post-media video {
            max-width: 100%;
            border-radius: 10px;
        }

        .post-footer {
            display: flex;
            gap: 15px;
            padding-top: 12px;
            border-top: 1px solid #ddd;
        }

        .post-action {
            cursor: pointer;
            color: #E63946;
            font-weight: 500;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .post-action:hover {
            color: #FFB703;
            text-decoration: underline;
        }

        .comments-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
        }

        .comments-list {
            margin-top: 15px;
        }

        .comment {
            background: #f0f0f0;
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 3px solid #FFB703;
        }

        .comment-header {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
            align-items: center;
            flex-wrap: wrap;
            font-size: 0.9em;
        }

        .comment-author {
            font-weight: 600;
            color: #555;
        }

        .comment-email {
            color: #999;
            font-size: 0.85em;
        }

        .comment-time {
            color: #999;
            font-size: 0.85em;
            margin-left: auto;
        }

        .comment-content {
            color: #444;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .comment-form {
            background: #f9f9f9;
            padding: 12px 15px;
            border-radius: 6px;
            margin-top: 10px;
            border: 1px solid #ddd;
        }

        .comment-form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .comment-form textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            min-height: 60px;
            font-family: inherit;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .comment-form textarea:focus {
            outline: none;
            border-color: #E63946;
            box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.1);
        }

        .comment-form input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9em;
        }

        .comment-form input:focus {
            outline: none;
            border-color: #E63946;
            box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.1);
        }

        .comment-form-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .btn-small-primary {
            background: #E63946;
            color: white;
        }

        .btn-small-primary:hover {
            background: #d63237;
        }

        .btn-small-secondary {
            background: #ddd;
            color: #333;
        }

        .btn-small-secondary:hover {
            background: #ccc;
        }

        .no-posts {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .no-posts-icon {
            font-size: 3em;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #eee;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: 700;
            color: #E63946;
        }

        .stat-label {
            color: #999;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .flag-icon {
            display: inline-block;
            width: 40px;
            height: 25px;
            margin-right: 12px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            vertical-align: middle;
        }

        .header-top {
            display: flex;
            align-items: center;
        }

        @media (max-width: 768px) {
            .board-container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .post-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .post-time {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const boards = [
            { id: 1, name: '📢 Общее', key: 'general' },
            { id: 2, name: '💻 Технологии', key: 'tech' },
            { id: 3, name: '🎮 Игры', key: 'games' },
            { id: 4, name: '🎨 Творчество', key: 'art' },
            { id: 5, name: '📚 Образование', key: 'education' },
            { id: 6, name: '🎵 Музыка', key: 'music' },
            { id: 7, name: '🎬 Аниме', key: 'anime' },
            { id: 8, name: '🎥 Фильмы', key: 'movies' },
            { id: 9, name: '🎭 Дорамы', key: 'dramas' },
            { id: 10, name: '⚽ Спорт', key: 'sports' },
            { id: 11, name: '⚡ Случайное', key: 'random' },
        ];

        // Экран входа/регистрации
        function AuthScreen() {
            const [isLogin, setIsLogin] = useState(true);
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [email, setEmail] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);

                try {
                    const endpoint = isLogin ? '/auth/login' : '/auth/register';
                    const body = isLogin
                        ? { username, password }
                        : { username, password, email };

                    const res = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body),
                    });

                    const data = await res.json();

                    if (!res.ok) {
                        setError(data.error || 'Ошибка при авторизации');
                        setLoading(false);
                        return;
                    }

                    // Сохраняем sessionId в localStorage
                    localStorage.setItem('sessionId', data.sessionId);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // Перезагружаем приложение для обновления состояния
                    window.location.reload();
                } catch (err) {
                    setError('Ошибка подключения к серверу');
                    setLoading(false);
                }
            };

            return (
                <div className="container">
                    <div className="header">
                        <div className="header-top">
                            <img className="flag-icon" src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Flag_of_Kyrgyzstan.svg/1920px-Flag_of_Kyrgyzstan.svg.png" alt="Флаг Кыргызстана" />
                            <h1>🚩 Майектеш</h1>
                        </div>
                        <p>Анонимная доска для обсуждения и общения</p>
                    </div>

                    <div style={{ maxWidth: '500px', margin: '50px auto' }}>
                        <div className="main-content">
                            <h2 className="board-title" style={{ textAlign: 'center' }}>
                                {isLogin ? '🔐 Вход' : '✏️ Регистрация'}
                            </h2>

                            <form className="post-form" onSubmit={handleSubmit}>
                                <input
                                    type="text"
                                    placeholder="Имя пользователя"
                                    value={username}
                                    onChange={(e) => setUsername(e.target.value)}
                                    disabled={loading}
                                    required
                                />
                                <div style={{ position: 'relative' }}>
                                    <input
                                        type={showPassword ? 'text' : 'password'}
                                        placeholder="Пароль"
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        disabled={loading}
                                        required
                                    />
                                    <button
                                        type="button"
                                        onClick={() => setShowPassword(prev => !prev)}
                                        style={{
                                            position: 'absolute',
                                            right: '12px',
                                            top: '50%',
                                            transform: 'translateY(-50%)',
                                            background: 'none',
                                            border: 'none',
                                            color: '#E63946',
                                            cursor: 'pointer',
                                            fontSize: '0.95em',
                                            padding: '0',
                                        }}
                                    >
                                        {showPassword ? 'Скрыть' : 'Показать'}
                                    </button>
                                </div>
                                {!isLogin && (
                                    <input
                                        type="email"
                                        placeholder="Email (необязательно)"
                                        value={email}
                                        onChange={(e) => setEmail(e.target.value)}
                                        disabled={loading}
                                    />
                                )}

                                {error && (
                                    <div style={{ color: '#E63946', padding: '12px', backgroundColor: '#ffe8e8', borderRadius: '8px', fontSize: '0.9em' }}>
                                        ❌ {error}
                                    </div>
                                )}

                                <button type="submit" className="btn btn-primary" disabled={loading}>
                                    {loading ? '⏳ Подождите...' : (isLogin ? '🔐 Войти' : '✏️ Зарегистрироваться')}
                                </button>
                            </form>

                            <div style={{ textAlign: 'center', marginTop: '20px' }}>
                                <p style={{ color: '#666', marginBottom: '10px' }}>
                                    {isLogin ? 'Нет аккаунта?' : 'Уже есть аккаунт?'}
                                </p>
                                <button
                                    onClick={() => {
                                        setIsLogin(!isLogin);
                                        setError('');
                                    }}
                                    style={{
                                        background: 'none',
                                        border: 'none',
                                        color: '#E63946',
                                        cursor: 'pointer',
                                        textDecoration: 'underline',
                                        fontSize: '1em',
                                        fontWeight: '600',
                                    }}
                                >
                                    {isLogin ? 'Зарегистрироваться' : 'Войти'}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Главный компонент доски
        function Board({ user, onLogout }) {
            const [activeBoard, setActiveBoard] = useState('general');
            const [posts, setPosts] = useState({});

            const [author, setAuthor] = useState(user.username);
            const [email, setEmail] = useState(user.email || '');
            const [content, setContent] = useState('');
            const [mediaFile, setMediaFile] = useState(null);
            const mediaInputRef = useRef(null);

            const [expandedComments, setExpandedComments] = useState({});
            const [commentAuthor, setCommentAuthor] = useState(user.username);
            const [commentEmail, setCommentEmail] = useState(user.email || '');
            const [commentContent, setCommentContent] = useState('');
            const [commentingOnPost, setCommentingOnPost] = useState(null);

            // загрузка постов с сервера
            const fetchPosts = async (boardKey) => {
                try {
                    const res = await fetch(`/posts/${boardKey}`);
                    const data = await res.json();
                    setPosts(prev => ({ ...prev, [boardKey]: data }));
                } catch (err) {
                    console.error('ошибка при получении постов', err);
                }
            };

            useEffect(() => {
                fetchPosts(activeBoard);
            }, [activeBoard]);

            // при монтировании загрузим сразу все доски, чтобы счётчики работали
            useEffect(() => {
                boards.forEach(b => fetchPosts(b.key));
            }, []);

            const handlePostSubmit = async (e) => {
                e.preventDefault();
                const hasText = content.trim().length > 0;
                if (!hasText && !mediaFile) return;

                try {
                    let body;
                    const headers = {};

                    if (mediaFile) {
                        body = new FormData();
                        body.append('author', author || 'Аноним');
                        body.append('email', email || '');
                        body.append('content', content || '');
                        body.append('media', mediaFile);
                    } else {
                        headers['Content-Type'] = 'application/json';
                        body = JSON.stringify({
                            author: author || 'Аноним',
                            email,
                            content,
                        });
                    }

                    const res = await fetch(`/posts/${activeBoard}`, {
                        method: 'POST',
                        headers,
                        body,
                    });

                    if (!res.ok) {
                        const errorData = await res.json().catch(() => null);
                        throw new Error(errorData?.error || `Ошибка ${res.status}: ${res.statusText}`);
                    }

                    const newPost = await res.json();

                    // Добавляем новый пост в список
                    setPosts(prev => ({
                        ...prev,
                        [activeBoard]: [newPost, ...(prev[activeBoard] || [])],
                    }));

                    // Обновляем все доски для корректных счётчиков
                    await fetchPosts(activeBoard);

                    // Показываем уведомление об успехе
                    alert('✅ Ваш пост успешно добавлен!');

                } catch (err) {
                    console.error('ошибка при отправке поста', err);
                    alert(`❌ Ошибка: ${err.message}`);
                }

                setAuthor(user.username);
                setEmail(user.email || '');
                setContent('');
                setMediaFile(null);
                if (mediaInputRef.current) {
                    mediaInputRef.current.value = '';
                }
            };

            const toggleComments = async (postId) => {
                const key = `${activeBoard}-${postId}`;
                if (expandedComments[key]) {
                    setExpandedComments(prev => ({ ...prev, [key]: false }));
                } else {
                    setExpandedComments(prev => ({ ...prev, [key]: true }));
                }
            };

            const handleDeletePost = async (postId) => {
                if (!window.confirm('Удалить этот пост?')) return;

                try {
                    const sessionId = localStorage.getItem('sessionId');
                    const res = await fetch(`/posts/${activeBoard}/${postId}`, {
                        method: 'DELETE',
                        headers: { 'x-session-id': sessionId },
                    });

                    if (!res.ok) {
                        const errorData = await res.json().catch(() => null);
                        throw new Error(errorData?.error || 'Ошибка при удалении поста');
                    }

                    setPosts(prev => ({
                        ...prev,
                        [activeBoard]: (prev[activeBoard] || []).filter(post => post.id !== postId),
                    }));
                    alert('✅ Пост удалён');
                } catch (err) {
                    console.error('ошибка при удалении поста', err);
                    alert(`❌ ${err.message}`);
                }
            };

            const handleCommentSubmit = async (e, postId) => {
                e.preventDefault();
                if (!commentContent.trim()) return;

                try {
                    const res = await fetch(`/posts/${activeBoard}/${postId}/comments`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            author: commentAuthor || 'Аноним',
                            email: commentEmail,
                            content: commentContent,
                        }),
                    });

                    if (!res.ok) {
                        const errorData = await res.json().catch(() => null);
                        throw new Error(errorData?.error || `Ошибка ${res.status}: ${res.statusText}`);
                    }

                    const newComment = await res.json();

                    setPosts(prev => ({
                        ...prev,
                        [activeBoard]: prev[activeBoard].map(post =>
                            post.id === postId
                                ? { ...post, comments: [...(post.comments || []), newComment] }
                                : post
                        ),
                    }));

                    alert('✅ Ваш комментарий добавлен!');
                } catch (err) {
                    console.error('ошибка при отправке комментария', err);
                    alert(`❌ Ошибка: ${err.message}`);
                }

                setCommentAuthor(user.username);
                setCommentEmail(user.email || '');
                setCommentContent('');
                setCommentingOnPost(null);
            };

            const currentBoard = boards.find(b => b.key === activeBoard);
            const currentPosts = posts[activeBoard] || [];

            return (
                <div className="container">
                    <div className="header">
                        <div className="header-top">
                            <img className="flag-icon" src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Flag_of_Kyrgyzstan.svg/1920px-Flag_of_Kyrgyzstan.svg.png" alt="Флаг Кыргызстана" />
                            <h1>🚩 Майектеш</h1>
                            <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: '20px' }}>
                                <span style={{ fontSize: '0.9em', color: '#666' }}>👤 {user.username}</span>
                                <button
                                    onClick={onLogout}
                                    className="btn btn-primary"
                                    style={{ padding: '8px 16px', fontSize: '0.9em' }}
                                >
                                    🚪 Выход
                                </button>
                            </div>
                        </div>
                        <p>Анонимная доска для обсуждения и общения</p>
                    </div>

                    <div className="board-container">
                        <div className="sidebar">
                            <h3>Доски</h3>
                            <ul className="board-list">
                                {boards.map(board => (
                                    <li
                                        key={board.key}
                                        className={`board-item ${activeBoard === board.key ? 'active' : ''}`}
                                        onClick={() => setActiveBoard(board.key)}
                                    >
                                        {board.name}
                                    </li>
                                ))}
                            </ul>
                        </div>

                        <div className="main-content">
                            <h2 className="board-title">{currentBoard.name}</h2>

                            <div className="create-post-panel">
                                <h4>Создать пост</h4>
                                <form className="post-form" onSubmit={handlePostSubmit}>
                                    <div className="form-row">
                                        <input
                                            type="text"
                                            placeholder="Имя (необязательно)"
                                            value={author}
                                            onChange={(e) => setAuthor(e.target.value)}
                                        />
                                        <input
                                            type="email"
                                            placeholder="Email (необязательно)"
                                            value={email}
                                            onChange={(e) => setEmail(e.target.value)}
                                        />
                                    </div>
                                    <textarea
                                        placeholder="Ваше сообщение..."
                                        value={content}
                                        onChange={(e) => setContent(e.target.value)}
                                    ></textarea>
                                    <input
                                        ref={mediaInputRef}
                                        type="file"
                                        accept="image/*,video/*,audio/*"
                                        onChange={(e) => setMediaFile(e.target.files?.[0] || null)}
                                        style={{ marginTop: '8px' }}
                                    />
                                    {mediaFile && (
                                        <div style={{ fontSize: '0.9em', color: '#555', marginTop: '6px' }}>
                                            Выбран файл: {mediaFile.name}
                                        </div>
                                    )}
                                    <button type="submit" className="btn btn-primary">Отправить пост</button>
                                </form>
                            </div>

                            <div className="posts-list">
                                {currentPosts.length === 0 ? (
                                    <div className="no-posts">
                                        <div className="no-posts-icon">📭</div>
                                        <p>На этой доске пока нет постов. Будь первым!</p>
                                    </div>
                                ) : (
                                    currentPosts.map((post, index) => {
                                        const commentsKey = `${activeBoard}-${post.id}`;
                                        const showComments = expandedComments[commentsKey];
                                        const postComments = post.comments || [];

                                        return (
                                            <div key={post.id} className="post">
                                                <div className="post-header">
                                                    <span className="post-number">№{currentPosts.length - index}</span>
                                                    <span className="post-author">{post.author}</span>
                                                    {post.email && <span className="post-email">{post.email}</span>}
                                                    <span className="post-time">{post.time}</span>
                                                </div>
                                                <div className="post-content">{post.content}</div>
                                                {post.media && (
                                                    <div className="post-media">
                                                        {post.media.mimeType?.startsWith('image') ? (
                                                            <img src={post.media.url} alt={post.media.originalName || 'Медиа'} />
                                                        ) : post.media.mimeType?.startsWith('video') ? (
                                                            <video controls src={post.media.url}></video>
                                                        ) : post.media.mimeType?.startsWith('audio') ? (
                                                            <audio controls src={post.media.url}></audio>
                                                        ) : (
                                                            <a href={post.media.url} target="_blank" rel="noreferrer">
                                                                {post.media.originalName || 'Скачать файл'}
                                                            </a>
                                                        )}
                                                        <div style={{ marginTop: '10px' }}>
                                                            <a
                                                                className="post-action"
                                                                href={post.media.url}
                                                                download={post.media.originalName || ''}
                                                            >
                                                                ⬇️ Скачать
                                                            </a>
                                                        </div>
                                                    </div>
                                                )}
                                                <div className="post-footer">
                                                    <span
                                                        className="post-action"
                                                        onClick={() => toggleComments(post.id)}
                                                    >
                                                        💬 {postComments.length > 0 ? `Ответы (${postComments.length})` : 'Ответить'}
                                                    </span>
                                                    <span className="post-action">⭐ Сохранить</span>
                                                    <span className="post-action">🚩 Пожаловаться</span>
                                                    {user.admin && (
                                                        <span className="post-action" onClick={() => handleDeletePost(post.id)}>
                                                            🗑️ Удалить
                                                        </span>
                                                    )}
                                                </div>

                                                {showComments && (
                                                    <div className="comments-section">
                                                        {postComments.length > 0 && (
                                                            <div className="comments-list">
                                                                {postComments.map(comment => (
                                                                    <div key={comment.id} className="comment">
                                                                        <div className="comment-header">
                                                                            <span className="comment-author">{comment.author}</span>
                                                                            {comment.email && <span className="comment-email">{comment.email}</span>}
                                                                            <span className="comment-time">{comment.time}</span>
                                                                        </div>
                                                                        <div className="comment-content">{comment.content}</div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        )}

                                                        {commentingOnPost === post.id && (
                                                            <form className="comment-form" onSubmit={(e) => handleCommentSubmit(e, post.id)}>
                                                                <div className="comment-form-row">
                                                                    <input
                                                                        type="text"
                                                                        placeholder="Имя (необязательно)"
                                                                        value={commentAuthor}
                                                                        onChange={(e) => setCommentAuthor(e.target.value)}
                                                                    />
                                                                    <input
                                                                        type="email"
                                                                        placeholder="Email (необязательно)"
                                                                        value={commentEmail}
                                                                        onChange={(e) => setCommentEmail(e.target.value)}
                                                                    />
                                                                </div>
                                                                <textarea
                                                                    placeholder="Ваш комментарий..."
                                                                    value={commentContent}
                                                                    onChange={(e) => setCommentContent(e.target.value)}
                                                                    required
                                                                ></textarea>
                                                                <div className="comment-form-buttons">
                                                                    <button type="submit" className="btn-small btn-small-primary">Отправить</button>
                                                                    <button
                                                                        type="button"
                                                                        className="btn-small btn-small-secondary"
                                                                        onClick={() => {
                                                                            setCommentingOnPost(null);
                                                                            setCommentContent('');
                                                                            setCommentAuthor(user.username);
                                                                            setCommentEmail(user.email || '');
                                                                        }}
                                                                    >
                                                                        Отмена
                                                                    </button>
                                                                </div>
                                                            </form>
                                                        )}

                                                        {commentingOnPost !== post.id && (
                                                            <button
                                                                className="btn-small btn-small-primary"
                                                                onClick={() => setCommentingOnPost(post.id)}
                                                                style={{ marginTop: '10px' }}
                                                            >
                                                                + Добавить комментарий
                                                            </button>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })
                                )}
                            </div>

                            <div className="stats">
                                <div className="stat">
                                    <div className="stat-value">{Object.values(posts).flat().length}</div>
                                    <div className="stat-label">Всего постов</div>
                                </div>
                                <div className="stat">
                                    <div className="stat-value">{boards.length}</div>
                                    <div className="stat-label">Досок</div>
                                </div>
                                <div className="stat">
                                    <div className="stat-value">{currentPosts.length}</div>
                                    <div className="stat-label">На доске</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Главное приложение
        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const sessionId = localStorage.getItem('sessionId');
                if (!sessionId) {
                    setLoading(false);
                    return;
                }

                fetch('/auth/user', {
                    headers: { 'x-session-id': sessionId },
                })
                    .then(async (res) => {
                        if (!res.ok) throw new Error('Не авторизован');
                        return res.json();
                    })
                    .then(data => {
                        setUser(data.user);
                        setIsAuthenticated(true);
                        localStorage.setItem('user', JSON.stringify(data.user));
                    })
                    .catch(() => {
                        localStorage.removeItem('sessionId');
                        localStorage.removeItem('user');
                        setIsAuthenticated(false);
                        setUser(null);
                    })
                    .finally(() => setLoading(false));
            }, []);

            const handleLogout = async () => {
                const sessionId = localStorage.getItem('sessionId');
                if (sessionId) {
                    try {
                        await fetch('/auth/logout', {
                            method: 'POST',
                            headers: { 'x-session-id': sessionId },
                        });
                    } catch (err) {
                        console.error('Ошибка при выходе:', err);
                    }
                }

                localStorage.removeItem('sessionId');
                localStorage.removeItem('user');
                setIsAuthenticated(false);
                setUser(null);
            };

            if (loading) {
                return <div style={{ textAlign: 'center', padding: '50px' }}>⏳ Загрузка...</div>;
            }

            if (!isAuthenticated) {
                return <AuthScreen />;
            }

            return <Board user={user} onLogout={handleLogout} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
